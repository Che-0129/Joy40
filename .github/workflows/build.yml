name: Build & Release QMK Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout firmware repo
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          path: qmk_firmware
          submodules: recursive

      - name: Checkout my repo
        uses: actions/checkout@v4
        with:
          path: Joy40

      - name: Inject keyboard into QMK
        run: |
          mkdir qmk_firmware/keyboards/joy40
          cp -r Joy40/* qmk_firmware/keyboards/joy40

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
          python3 -m pip install qmk

      - name: Build firmware
        working-directory: qmk_firmware
        run: |
          qmk compile -kb joy40 -km default

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: joy40 latest
          prerelease: false
          files: qmk_firmware/*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
